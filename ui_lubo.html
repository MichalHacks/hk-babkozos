<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TEST APP</title>
		<link rel="stylesheet" href="./main.css">
		<link rel="stylesheet" href="./ui_lubo_fyp.css">
		<link rel="stylesheet" href="./ui_lubo_profile.css">
		<link rel="stylesheet" href="./ui_lubo_search.css">

		<link rel="stylesheet" href="./material_symbols.css" />
		<script src="./card_carousel.js"></script>
	</head>
	<body>
		<div class="app">
			<div class="top-bar glass">
				<div class="logo">test appppp</div>
			</div>
			<div class="main">
				<!-- RELEVANT -->
				<div id="view-relevant" class="view active">
					<div id="relevant-list"></div>
					<script src="./ui_lubo_relevant.js"></script>
				</div>
				<!-- SEARCH -->
				<div id="view-search" class="view">
					<div class="search-bar">
						<div class="search-inner">
							<input type="text" id="searchInput" placeholder="Search items, tags..." />
						</div>
					
						<div class="filters">
							<div class="filter active" data-cat="">Všetky</div>
							<div class="filter" data-cat="GARDEN">Záhrada</div>
							<div class="filter" data-cat="HOME">Domov</div>
							<div class="filter" data-cat="TECHNOLOGY">Technológia</div>
							<div class="filter" data-cat="ERRANDS">Pochôdzky</div>
							<div class="filter" data-cat="OTHERS">Ostatné</div>
						</div>
					</div>
					<div id="search-list"></div>
					<script src="./ui_lubo_search.js"></script>
				</div>
				<!-- PROFILE -->
				<div id="view-profile" class="view">
					<script src="./ui_lubo_profile.js"></script>
				</div>
			</div>
			<div class="bottom-bar glass">
				<div class="tab active" data-view="relevant"><span class="material-symbols-outlined">public</span> For You</div>
				<div class="tab" data-view="search"><span class="material-symbols-outlined">search</span> Search</div>
				<div class="tab" data-view="profile"><span class="material-symbols-outlined">account_circle</span> Profile</div>
			</div>
		</div>
		<script>
			const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjMsImV4cCI6MTc3OTEyMDAyOX0.CpE7xtFq8Jk0BjztaWdR0earJSKyZSrgEvTt5bWRso8";
			function handleFinished(demandId) {
				fetch("http://10.0.5.33:8080/demands/" + demandId +"/resolve", {
						method: "PATCH",
						headers: { "Authorization": TOKEN }
					})
					.then(() => {}).then(() => {window.location.reload();});
			}
			function handleTake(demandId) {
				fetch("http://10.0.5.33:8080/demands/" + demandId +"/claim", {
						method: "PATCH",
						headers: { "Authorization": TOKEN }
					})
					.then(() => {}).then(() => {window.location.reload();});
			}
			function handleCancel(demandId) {
				fetch("http://10.0.5.33:8080/demands/" + demandId +"/cancel", {
						method: "PATCH",
						headers: { "Authorization": TOKEN }
					})
					.then(() => {}).then(() => {window.location.reload();});
			}
			/* TAB SWITCHING */
			document.querySelectorAll(".tab").forEach(tab => {
				tab.onclick = () => {
					document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
					document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
					tab.classList.add("active");
					document.getElementById("view-" + tab.dataset.view).classList.add("active");
					document.getElementById("view-" + tab.dataset.view)?.init();
				};
				if (tab.classList.contains("active"))
					document.getElementById("view-" + tab.dataset.view)?.init();
			});
		</script>
	</body>
</html>
