<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TEST APP</title>
		<link rel="stylesheet" href="./main.css">
		<link rel="stylesheet" href="./ui_lubo_fyp.css">
		<link rel="stylesheet" href="./ui_lubo_profile.css">
		<link rel="stylesheet" href="./ui_lubo_search.css">
	</head>
	<body>
		<div class="app">
			<div class="top-bar">
				<div class="logo">test app</div>
			</div>
			<div class="main">
				<!-- RELEVANT -->
				<div id="view-relevant" class="view active">
					<style>
						.action-btn.take {
							color: var(--color-success) !important;
						}

						.action-btn.take:hover {
							background: var(--color-success) !important;
							color: #fff !important;
						}
					</style>
					<div id="relevant-list"></div>
				</div>
				<!-- SEARCH -->
				<div id="view-search" class="view">
					<div class="search-bar">
						<div class="search-inner">
							<input type="text" id="searchInput" placeholder="Search items, tags..." />
						</div>
					
						<div class="filters">
							<div class="filter">tech</div>
							<div class="filter">ui</div>
							<div class="filter">design</div>
							<div class="filter">startup</div>
						</div>
					</div>
					<div id="search-list"></div>
				</div>
				<!-- PROFILE -->
				<div id="view-profile" class="view">
					<p style="padding:20px">Profile (dummy)</p>
				</div>
			</div>
			<div class="bottom-bar">
				<div class="tab active" data-view="relevant">Relevant</div>
				<div class="tab" data-view="search">Search</div>
				<div class="tab" data-view="profile">Profile</div>
			</div>
		</div>
		<script>

			const data = [{
				title: "Frontend UI Help",
				username: "john_doe",
				desc: "Looking for help with responsive layout.",
				tags: ["tech", "ui"],
				location: "Košice",
				contact: "john@mail.com",
				extra: "Remote",
				img: "https://picsum.photos/400/200",
				user: "https://i.pravatar.cc/40?img=1"
			}, {
				title: "Design Feedback",
				username: "anna_design",
				desc: "Need critique on mobile app.",
				tags: ["design"],
				location: "Prague",
				contact: "anna@mail.com",
				extra: "Freelance",
				img: "https://picsum.photos/400/201",
				user: "https://i.pravatar.cc/40?img=2"
			}];


			/* CARD GENERATOR */
			function createCard(item) {
				const el = document.createElement("div");
				el.className = "card";
				el.innerHTML = `
					<img class="main-img" src="${item.img}">
					<div class="card-content">
						<div class="user-row">
							<img class="avatar" src="${item.user}">
							<div class="username">${item.username}</div>
						</div>

						<div class="card-body">
							<div class="left">
								<div class="title">${item.title}</div>
								<div class="desc">${item.desc}</div>
								<div class="tags">
									${item.tags.map(t => `<div class="tag">${t}</div>`).join("")}
								</div>
							</div>

							<div class="right">
								<div class="meta">${item.location}</div>
								<div class="meta">${item.contact}</div>
								<div class="meta">${item.extra}</div>
							</div>
						</div>
					</div>
					<div class="card-actions">
						<button class="action-btn take">Take</button>
					</div>
				`;
				return el;
			}


			/* RENDERERS */
			function renderList(containerId, items) {
				const container = document.getElementById(containerId);
				container.innerHTML = "";
				items.forEach(item => container.appendChild(createCard(item)));
			}


			/* INIT */
			renderList("relevant-list", data);
			renderList("search-list", data);
			/* TAB SWITCHING */
			document.querySelectorAll(".tab").forEach(tab => {
				tab.onclick = () => {
					document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
					document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
					tab.classList.add("active");
					document.getElementById("view-" + tab.dataset.view).classList.add("active");
				};
			});


			/* SEARCH */
			const input = document.getElementById("searchInput");
			const filters = document.querySelectorAll(".filter");
			let activeTag = null;
			filters.forEach(f => {
				f.onclick = () => {
					filters.forEach(x => x.classList.remove("active"));
					f.classList.add("active");
					activeTag = f.innerText;
					filter();
				};
			});
			input.oninput = filter;

			function filter() {
				const term = input.value.toLowerCase();
				const filtered = data.filter(item => {
					const matchText = item.title.toLowerCase().includes(term);
					const matchTag = !activeTag || item.tags.includes(activeTag);
					return matchText && matchTag;
				});
				renderList("search-list", filtered);
			}
		</script>
	</body>
</html>
