<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TEST APP</title>
		<link rel="stylesheet" href="./main.css">
		<link rel="stylesheet" href="./ui_lubo_search.css">
		<link rel="stylesheet" href="./ui_lubo_profile.css">
		<link rel="stylesheet" href="./ui_blazena_new.css">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

		<link rel="stylesheet" href="./material_symbols.css" />
		<script src="./card_carousel.js"></script>
	</head>
	<body>
		<div class="app">
			<div class="top-bar glass">
				<img src="./logo-black.svg" height="55px">
			</div>
			<div class="main">
				<!-- NEW INZERAT -->
				<div id="view-blazena" class="view active">
					<div class="tab-container" id="tab-container"></div>
					<script src="./ui_blazena_new.js"></script>
				</div>
				<!-- RELEVANT -->
				<div id="view-relevant" class="view">
					<div id="relevant-list"></div>
					<script src="ui_blazena_relevant.js"></script>
				</div>
				<!-- PROFILE -->
				<div id="view-profile" class="view">
					<script src="ui_blazena_profile.js"></script>
				</div>
			</div>
			<div class="bottom-bar glass">
				<div class="tab active" data-view="blazena"><span class="material-symbols-outlined">waving_hand</span> New Demand</div>
				<div class="tab" data-view="relevant"><span class="material-symbols-outlined">notifications_active</span> My Demands</div>
				<div class="tab" data-view="profile"><span class="material-symbols-outlined">account_circle</span> Profile</div>
			</div>
		</div>
		<script>
			// Register the service worker
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.register('/service-worker.js');
			}

			fetch("https://632a-88-212-1-74.ngrok-free.app/users/offline", {
				method: "GET",
				headers: {
					"Authorization": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjMsImV4cCI6MTc3OTEyMDAyOX0.CpE7xtFq8Jk0BjztaWdR0earJSKyZSrgEvTt5bWRso8"
				}
			}).then(response => {
				if (!response.ok) {
					throw new Error(response.text());
				}
				return response.json();
			})
			.catch(error => {
				alert(error.message);
			})
			.then(profileData => {
				localStorage.setItem("profileData", JSON.stringify(profileData));
			});

			/* TAB SWITCHING */
			document.querySelectorAll(".tab").forEach(tab => {
				tab.onclick = () => {
					document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
					document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
					tab.classList.add("active");
					document.getElementById("view-" + tab.dataset.view).classList.add("active");
					document.getElementById("view-" + tab.dataset.view)?.init();
				};
				if (tab.classList.contains("active"))
					document.getElementById("view-" + tab.dataset.view)?.init();
			});
		</script>
	</body>
</html>
