<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TEST APP</title>
		<link rel="stylesheet" href="./main.css">
		<link rel="stylesheet" href="./ui_lubo_fyp.css">
		<link rel="stylesheet" href="./ui_lubo_profile.css">
		<link rel="stylesheet" href="./ui_blazena_new.css">

		<link rel="stylesheet" href="./material_symbols.css" />
		<script src="./card_carousel.js"></script>
	</head>
	<body>
		<div class="app">
			<div class="top-bar glass">
				<div class="logo">test app</div>
			</div>
			<div class="main">
				<!-- NEW INZERAT -->
				<div id="view-blazena" class="view active">
					<div class="tab-container" id="tab-container"></div>
					<script src="./ui_blazena_new.js"></script>
				</div>
				<!-- RELEVANT -->
				<div id="view-relevant" class="view">
					<div id="relevant-list"></div>
					<script src="ui_blazena_relevant.js"></script>
				</div>
				<!-- PROFILE -->
				<div id="view-profile" class="view">
					<script src="ui_blazena_profile.js"></script>
				</div>
			</div>
			<div class="bottom-bar glass">
				<div class="tab active" data-view="blazena"><span class="material-symbols-outlined">waving_hand</span> New Demand</div>
				<div class="tab" data-view="relevant"><span class="material-symbols-outlined">notifications_active</span> My Demands</div>
				<div class="tab" data-view="profile"><span class="material-symbols-outlined">account_circle</span> Profile</div>
			</div>
		</div>
		<script>
			/* TAB SWITCHING */
			document.querySelectorAll(".tab").forEach(tab => {
				tab.onclick = () => {
					document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
					document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
					tab.classList.add("active");
					document.getElementById("view-" + tab.dataset.view).classList.add("active");
					document.getElementById("view-" + tab.dataset.view)?.init();
				};
				if (tab.classList.contains("active"))
					document.getElementById("view-" + tab.dataset.view)?.init();
			});
		</script>
	</body>
</html>
