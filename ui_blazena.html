<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TEST APP</title>
		<link rel="stylesheet" href="./main.css">
		<link rel="stylesheet" href="./ui_lubo_fyp.css">
		<link rel="stylesheet" href="./ui_lubo_profile.css">
		<link rel="stylesheet" href="./ui_blazena_new.css">

		<link rel="stylesheet" href="./material_symbols.css" />
	</head>
	<body>
		<div class="app">
			<div class="top-bar glass">
				<div class="logo">test app</div>
			</div>
			<div class="main">
				<!-- NEW INZERAT -->
				<div id="view-blazena" class="view active">
				
					<!-- breadcrumb / local tabs -->
					<div class="blazena-tabs" id="blazena-tabs"></div>
				
					<!-- grid container -->
					<div class="blazena-grid" id="blazena-grid"></div>
				
					<script>
						(() => {

							/* ===== HIERARCHICAL DATA TREE ===== */
							const tree = {
								root: {
									title: "Start",
									items: {
										garden: {
											label: "Záhrada",
											icon: "🪏",
											items: {
												hedge: { label: "Strihanie živého plota", icon: "✂️" },
												water: { label: "Polievanie", icon: "💧" },
												clean: { label: "Čistenie záhrady", icon: "🧹" }
											}
										},
										shopping: {
											label: "Nákupy",
											icon: "🛒",
											items: {
												food: { label: "Potraviny", icon: "🥦" },
												home: { label: "Domáce potreby", icon: "🧴" }
											}
										},
										moving: {
											label: "Prenášanie",
											icon: "📦",
											items: {
												boxes: { label: "Krabice", icon: "📦" },
												furniture: { label: "Nábytok", icon: "🪑" }
											}
										}
									}
								}
							};

							let path = ["root"];

							document.getElementById("view-blazena").init = () => {
								path = ["root"];
								render();
							}

							const grid = document.getElementById("blazena-grid");
							const tabs = document.getElementById("blazena-tabs");

							function getNode(pathArr) {
								return pathArr.reduce((acc, key) => acc.items?.[key] || acc, tree.root);
							}

							function addItem(item, click) {
								const el = document.createElement("div");
								el.className = "blazena-item";

								el.innerHTML = `
									<span class="big">${item.icon || "📁"}</span>
									<span>${item.label}</span>
								`;

								el.onclick = click;

								grid.appendChild(el);

								return el;
							}

							function render() {
								const node = getNode(path);

								/* GRID */
								grid.innerHTML = "";

								Object.entries(node.items || {}).forEach(([key, item]) => {
									addItem(item, () => {
										if (item.items) {
											path.push(key);
											render();
										}
									});
								});

								if (path.length > 1) {
									addItem({icon: "⬅", label: "Back"}, () => {path.pop(); render()})
								}

								/* TABS (breadcrumb-style) */
								tabs.innerHTML = "";

								path.forEach((p, i) => {
									const btn = document.createElement("div");
									btn.className = "blazena-tab";
									btn.textContent = p;

									btn.onclick = () => {
										path = path.slice(0, i + 1);
										render();
									};

									tabs.appendChild(btn);
									
									if (i < path.length - 1)
										tabs.insertAdjacentHTML("beforeend", `<span class="material-symbols-outlined">chevron_right</span>`)
								});
							}

							render();
						})();
					</script>
				</div>
				<!-- RELEVANT -->
				<div id="view-relevant" class="view">
					<style>
						.action-btn.edit {
							color: var(--color-info) !important;
						}
					
						.action-btn.delete {
							color: var(--color-danger) !important;
						}
					
						.action-btn.edit:hover {
							background: var(--color-info) !important;
							color: #fff !important;
						}
					
						.action-btn.delete:hover {
							background: var(--color-danger) !important;
							color: #fff !important;
						}
					</style>
					<div id="relevant-list"></div>
				</div>
				<!-- PROFILE -->
				<div id="view-profile" class="view">
					<p style="padding:20px">Profile (dummy)</p>
				</div>
			</div>
			<div class="bottom-bar glass">
				<div class="tab active" data-view="blazena"><span class="material-symbols-outlined">waving_hand</span> New Demand</div>
				<div class="tab" data-view="relevant"><span class="material-symbols-outlined">notifications_active</span> My Demands</div>
				<div class="tab" data-view="profile"><span class="material-symbols-outlined">account_circle</span> Profile</div>
			</div>
		</div>
		<script>

			const data = [{
				title: "Frontend UI Help",
				username: "john_doe",
				desc: "Looking for help with responsive layout.",
				tags: ["tech", "ui"],
				location: "Košice",
				contact: "john@mail.com",
				extra: "Remote",
				img: "https://picsum.photos/400/200",
				user: "https://i.pravatar.cc/40?img=1"
			}, {
				title: "Design Feedback",
				username: "anna_design",
				desc: "Need critique on mobile app.",
				tags: ["design"],
				location: "Prague",
				contact: "anna@mail.com",
				extra: "Freelance",
				img: "https://picsum.photos/400/201",
				user: "https://i.pravatar.cc/40?img=2"
			}];


			/* CARD GENERATOR */
			function createCard(item) {
				const el = document.createElement("div");
				el.className = "card";
				el.innerHTML = `
					<img class="main-img" src="${item.img}">
					<div class="card-content">
						<div class="user-row">
							<img class="avatar" src="${item.user}">
							<div class="username">${item.username}</div>
						</div>
						<div class="card-body">
							<div class="left">
								<div class="title">${item.title}</div>
							</div>
						</div>
					</div>
					<div class="card-actions">
						<button class="action-btn edit"><span class="material-symbols-outlined">edit_square</span> Edit</button>
						<button class="action-btn delete"><span class="material-symbols-outlined">close</span> Delete</button>
					</div>
  				`;
				return el;
			}


			/* RENDERERS */
			function renderList(containerId, items) {
				const container = document.getElementById(containerId);
				container.innerHTML = "";
				items.forEach(item => container.appendChild(createCard(item)));
			}


			/* INIT */
			renderList("relevant-list", data);
			/* TAB SWITCHING */
			document.querySelectorAll(".tab").forEach(tab => {
				tab.onclick = () => {
					document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
					document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
					tab.classList.add("active");
					document.getElementById("view-" + tab.dataset.view).classList.add("active");
					document.getElementById("view-" + tab.dataset.view)?.init?.call();
				};
			});
		</script>
	</body>
</html>
